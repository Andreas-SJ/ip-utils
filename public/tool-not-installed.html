<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tool Not Installed - ip-utils</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d1014;
    --bg-elev: #141921;
    --line: #1f2530;
    --line-strong: #2a3142;
    --ink: #e6e1d5;
    --ink-mute: #9aa1ad;
    --ink-faint: #5a6370;
    --accent: #e8a85c;
    --accent-dim: #8a6535;
    --danger: #d96856;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --serif: 'IBM Plex Serif', Georgia, serif;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: -1px -1px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 760px;
    background: var(--bg-elev);
    border: 1px solid var(--line-strong);
    border-left: 3px solid var(--danger);
    border-radius: 3px;
    padding: 30px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.45);
  }

  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    padding: 4px 8px;
    border-radius: 2px;
    margin-bottom: 12px;
  }

  h1 {
    margin: 0 0 10px;
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  p {
    margin: 0 0 14px;
    color: var(--ink-mute);
    line-height: 1.6;
  }

  .req {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink);
    padding: 8px 10px;
    border: 1px dashed var(--line-strong);
    display: inline-block;
    margin: 0 0 18px;
  }

  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 6px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink);
    border: 1px solid var(--line-strong);
    border-radius: 2px;
    padding: 8px 12px;
    transition: all .15s ease;
  }

  .btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .btn.primary {
    color: var(--accent);
    border-color: var(--accent-dim);
  }

  .hint {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
  }

  ::selection { background: var(--accent); color: var(--bg); }
</style>
</head>
<body>

<div class="card">
  <div class="tag">ip-utils</div>
  <h1>Tool not installed</h1>
  <p>This endpoint is not available in the current installation mode.</p>
  <div class="req" id="requested">requested path: ...</div>
  <div class="links" id="links">
    <a class="btn primary" href="/">go to home</a>
  </div>
  <div class="hint">Use the installer to switch to both tools if you want access to all features.</div>
</div>

<script>
(function init() {
  var requested = document.getElementById('requested');
  requested.textContent = 'requested path: ' + (window.location.pathname || '/');

  fetch('/api/config').then(function(res) {
    return res.ok ? res.json() : { hasPlanner: false, hasNetplan: false };
  }).then(function(cfg) {
    var links = document.getElementById('links');
    var html = '<a class="btn primary" href="/">go to home</a>';
    if (cfg.hasPlanner) html += '<a class="btn" href="/ip-planner">open ip-planner</a>';
    if (cfg.hasNetplan) html += '<a class="btn" href="/netplan-gen">open netplan-gen</a>';
    if (cfg.hasPlanner) html += '<a class="btn" href="/login">log in</a>';
    links.innerHTML = html;
  }).catch(function() {});
})();
</script>

</body>
</html>
