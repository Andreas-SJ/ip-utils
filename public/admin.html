<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin &mdash; ip-utils</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d1014;
    --bg-elev: #141921;
    --bg-sunk: #090c10;
    --line: #1f2530;
    --line-strong: #2a3142;
    --ink: #e6e1d5;
    --ink-mute: #9aa1ad;
    --ink-faint: #5a6370;
    --accent: #e8a85c;
    --accent-dim: #8a6535;
    --danger: #d96856;
    --ok: #7fb069;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --serif: 'IBM Plex Serif', Georgia, serif;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: -1px -1px;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; text-underline-offset: 3px; }

  .shell { max-width: 900px; margin: 0 auto; padding: 0 28px; }

  header {
    border-bottom: 1px solid var(--line);
    padding: 22px 0 18px;
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
  }

  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand-mark {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
    color: var(--accent); text-transform: uppercase;
    border: 1px solid var(--accent-dim); padding: 4px 8px; border-radius: 2px;
  }
  .brand h1 {
    font-family: var(--serif); font-weight: 400; font-style: italic;
    font-size: 26px; margin: 0; letter-spacing: -0.01em;
  }
  .brand h1 b { font-style: normal; font-weight: 600; }

  .header-nav {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--mono); font-size: 11px; color: var(--ink-faint);
  }
  .header-nav a { color: var(--accent); }

  main { padding: 36px 0 80px; }

  .section { margin-bottom: 44px; }
  .section-head {
    display: flex; align-items: baseline; gap: 14px; margin-bottom: 18px;
    padding-bottom: 10px; border-bottom: 1px dashed var(--line-strong);
  }
  .section-num { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.1em; }
  .section-title { font-family: var(--serif); font-weight: 600; font-size: 18px; margin: 0; }

  .lbl {
    display: block; font-family: var(--mono); font-size: 11px; color: var(--ink-mute);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }

  input[type="text"], input[type="password"] {
    width: 100%; background: var(--bg-sunk); color: var(--ink);
    border: 1px solid var(--line-strong); border-radius: 2px; padding: 9px 11px;
    font-family: var(--mono); font-size: 13px;
    transition: border-color .15s, background .15s;
  }
  input:focus { outline: none; border-color: var(--accent); background: #0b0e12; }
  input::placeholder { color: var(--ink-faint); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto auto; gap: 10px; align-items: end; }
  @media (max-width: 700px) {
    .form-grid { grid-template-columns: 1fr; }
  }

  label.check {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
    font-family: var(--mono); font-size: 11px; color: var(--ink);
    padding: 9px 10px; border: 1px solid var(--line-strong); border-radius: 2px;
    background: var(--bg-sunk); white-space: nowrap; transition: border-color .15s;
  }
  label.check:hover { border-color: var(--ink-mute); }
  label.check input { display: none; }
  label.check .box {
    width: 12px; height: 12px; border: 1px solid var(--ink-faint);
    display: inline-block; position: relative; flex-shrink: 0;
  }
  label.check input:checked + .box { background: var(--accent); border-color: var(--accent); }
  label.check input:checked + .box::after {
    content: ''; position: absolute; inset: 2px; background: var(--bg);
    clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
  }
  label.check input:checked ~ .lbl-text { color: var(--accent); }

  button, .btn {
    cursor: pointer; font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em;
    text-transform: uppercase; background: transparent; color: var(--ink);
    border: 1px solid var(--line-strong); padding: 8px 14px; border-radius: 2px;
    transition: all .15s ease; display: inline-flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { border-color: var(--accent-dim); color: var(--accent); }
  button.primary:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  button.danger { color: var(--danger); border-color: var(--line-strong); font-size: 11px; padding: 6px 10px; }
  button.danger:hover { color: var(--bg); background: var(--danger); border-color: var(--danger); }
  button.ghost { border-color: transparent; color: var(--ink-mute); padding: 6px 10px; font-size: 11px; }
  button.ghost:hover { color: var(--accent); border-color: transparent; }

  .form-err {
    color: var(--danger); font-family: var(--mono); font-size: 12px;
    margin-top: 8px; min-height: 16px;
  }

  .user-table {
    width: 100%; border-collapse: collapse;
    border: 1px solid var(--line-strong); border-radius: 3px; overflow: hidden;
  }
  .user-table th {
    text-align: left; padding: 9px 14px; background: var(--bg-elev);
    font-family: var(--mono); font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--ink-faint);
    border-bottom: 1px solid var(--line);
  }
  .user-table td {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 13px; color: var(--ink-mute);
    vertical-align: middle;
  }
  .user-table tr:last-child td { border-bottom: 0; }
  .user-table tr:hover td { background: rgba(255,255,255,0.015); }

  .u-name { color: var(--ink); font-weight: 500; }
  .badge {
    display: inline-block; font-family: var(--mono); font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.1em; padding: 2px 6px;
    border-radius: 2px; border: 1px solid;
  }
  .badge-admin { color: var(--accent); border-color: var(--accent-dim); }
  .badge-plan { color: var(--ok); border-color: rgba(127,176,105,0.4); }
  .badge-no-plan { color: var(--ink-faint); border-color: var(--line-strong); }

  .action-cell { display: flex; gap: 6px; align-items: center; }

  .empty-row td { color: var(--ink-faint); font-style: italic; text-align: center; padding: 28px; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: var(--bg);
    padding: 10px 16px; border-radius: 2px; font-family: var(--mono); font-size: 12px;
    letter-spacing: 0.04em; text-transform: uppercase; transform: translateY(80px);
    opacity: 0; transition: all .25s ease; pointer-events: none; z-index: 100;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .modal-back {
    position: fixed; inset: 0; background: rgba(5,7,10,0.66); z-index: 200;
    display: none; align-items: center; justify-content: center; padding: 24px;
    backdrop-filter: blur(2px);
  }
  .modal-back.show { display: flex; }
  .modal {
    background: var(--bg-elev); border: 1px solid var(--line-strong);
    border-left: 3px solid var(--danger); border-radius: 3px;
    max-width: 440px; width: 100%; padding: 22px 24px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.55);
  }
  .modal h3 { font-family: var(--serif); font-size: 18px; margin: 0 0 10px; }
  .modal p { color: var(--ink-mute); font-size: 13px; margin: 0 0 18px; font-family: var(--mono); line-height: 1.6; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-ok { border-color: var(--danger); color: var(--danger); padding: 8px 16px; }
  .modal-ok:hover { background: var(--danger); color: var(--bg); border-color: var(--danger); }

  footer {
    border-top: 1px solid var(--line); padding: 20px 0 28px;
    color: var(--ink-faint); font-family: var(--mono); font-size: 11px;
  }

  ::selection { background: var(--accent); color: var(--bg); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-sunk); }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }
</style>
</head>
<body>

<div class="shell">
  <header>
    <div class="brand">
      <span class="brand-mark">admin</span>
      <h1><i>user</i> <b>management</b></h1>
    </div>
    <div class="header-nav">
      <a href="/">home</a>
      &nbsp;&middot;&nbsp;
      <span id="admin-name"></span>
      &nbsp;&middot;&nbsp;
      <a href="#" id="logout-link">logout</a>
    </div>
  </header>

  <main>

    <div class="section">
      <div class="section-head">
        <span class="section-num">§ 01</span>
        <h2 class="section-title">Users</h2>
      </div>

      <table class="user-table" id="user-table">
        <thead>
          <tr>
            <th>Username</th>
            <th>Role</th>
            <th>IP Plan</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="user-tbody">
          <tr class="empty-row"><td colspan="4">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-head">
        <span class="section-num">§ 02</span>
        <h2 class="section-title">Create User</h2>
      </div>

      <div class="form-grid">
        <div>
          <span class="lbl">Username</span>
          <input type="text" id="new-username" placeholder="username" autocomplete="off" />
        </div>
        <div>
          <span class="lbl">Password</span>
          <input type="password" id="new-password" placeholder="min. 8 characters" autocomplete="new-password" />
        </div>
        <div>
          <span class="lbl">Role</span>
          <label class="check">
            <input type="checkbox" id="new-is-admin" />
            <span class="box"></span>
            <span class="lbl-text">Admin</span>
          </label>
        </div>
        <div>
          <span class="lbl">&nbsp;</span>
          <button class="primary" id="btn-create">+ create</button>
        </div>
      </div>
      <div class="form-err" id="create-err"></div>
    </div>

  </main>

  <footer>ip-utils admin panel</footer>
</div>

<div id="toast" class="toast"></div>

<div id="modal-back" class="modal-back">
  <div class="modal">
    <h3 id="modal-title">Confirm</h3>
    <p id="modal-msg"></p>
    <div class="modal-actions">
      <button class="ghost" id="modal-cancel" style="padding:8px 14px">Cancel</button>
      <button class="modal-ok" id="modal-ok">Confirm</button>
    </div>
  </div>
</div>

<script>
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const toastEl = document.getElementById('toast');
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toastEl.classList.remove('show'), 2000);
}

function confirmDialog(title, msg, label) {
  return new Promise(resolve => {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-msg').textContent = msg;
    const ok = document.getElementById('modal-ok');
    const cancel = document.getElementById('modal-cancel');
    const back = document.getElementById('modal-back');
    ok.textContent = label || 'Confirm';
    back.classList.add('show');
    function cleanup(v) {
      back.classList.remove('show');
      ok.onclick = cancel.onclick = back.onclick = null;
      document.removeEventListener('keydown', onKey);
      resolve(v);
    }
    function onKey(e) {
      if (e.key === 'Escape') cleanup(false);
      else if (e.key === 'Enter') cleanup(true);
    }
    ok.onclick = () => cleanup(true);
    cancel.onclick = () => cleanup(false);
    back.onclick = e => { if (e.target === back) cleanup(false); };
    document.addEventListener('keydown', onKey);
    ok.focus();
  });
}

let currentUser = null;

async function loadMe() {
  const r = await fetch('/api/me');
  if (!r.ok) { window.location.href = '/login'; return; }
  currentUser = await r.json();
  document.getElementById('admin-name').textContent = currentUser.username;
}

async function loadUsers() {
  const r = await fetch('/api/admin/users');
  if (!r.ok) return;
  const users = await r.json();
  const tbody = document.getElementById('user-tbody');

  if (!users.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="4">No users found.</td></tr>';
    return;
  }

  tbody.innerHTML = users.map(u => `
    <tr data-username="${esc(u.username)}">
      <td><span class="u-name">${esc(u.username)}</span></td>
      <td>${u.isAdmin ? '<span class="badge badge-admin">admin</span>' : '<span style="color:var(--ink-faint);font-size:12px">user</span>'}</td>
      <td>${u.hasPlan
        ? '<span class="badge badge-plan">has plan</span>'
        : '<span class="badge badge-no-plan">no plan</span>'}</td>
      <td>
        <div class="action-cell">
          ${u.hasPlan ? `<button class="ghost" data-action="delete-plan" data-user="${esc(u.username)}">delete plan</button>` : ''}
          ${u.username !== currentUser?.username
            ? `<button class="danger" data-action="delete-user" data-user="${esc(u.username)}">delete user</button>`
            : '<span style="color:var(--ink-faint);font-size:11px;font-family:var(--mono)">(you)</span>'}
        </div>
      </td>
    </tr>
  `).join('');
}

document.getElementById('user-tbody').addEventListener('click', async e => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const username = btn.dataset.user;

  if (action === 'delete-plan') {
    const ok = await confirmDialog(
      'Delete IP plan',
      'Delete the IP plan for "' + username + '"? This cannot be undone. The user account will remain.',
      'Delete plan'
    );
    if (!ok) return;
    const r = await fetch('/api/admin/plans/' + encodeURIComponent(username), { method: 'DELETE' });
    const d = await r.json();
    if (!r.ok) { showToast(d.error || 'Error'); return; }
    showToast('Plan deleted');
    loadUsers();
  }

  if (action === 'delete-user') {
    const ok = await confirmDialog(
      'Delete user',
      'Delete user "' + username + '" and their IP plan? This cannot be undone.',
      'Delete user'
    );
    if (!ok) return;
    const r = await fetch('/api/admin/users/' + encodeURIComponent(username), { method: 'DELETE' });
    const d = await r.json();
    if (!r.ok) { showToast(d.error || 'Error'); return; }
    showToast('User deleted');
    loadUsers();
  }
});

document.getElementById('btn-create').addEventListener('click', async () => {
  const username = document.getElementById('new-username').value.trim();
  const password = document.getElementById('new-password').value;
  const isAdmin = document.getElementById('new-is-admin').checked;
  const errEl = document.getElementById('create-err');
  errEl.textContent = '';

  if (!username || !password) {
    errEl.textContent = 'Username and password are required.';
    return;
  }

  const r = await fetch('/api/admin/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password, isAdmin })
  });
  const d = await r.json();
  if (!r.ok) {
    errEl.textContent = d.error || 'Failed to create user.';
    return;
  }

  document.getElementById('new-username').value = '';
  document.getElementById('new-password').value = '';
  document.getElementById('new-is-admin').checked = false;
  showToast('User created');
  loadUsers();
});

document.getElementById('logout-link').addEventListener('click', async e => {
  e.preventDefault();
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
});

(async function init() {
  await loadMe();
  await loadUsers();
})();
</script>

</body>
</html>
